# Skills system configuration
skills:
  enabled: true
  skills_dir: "./skills"
  active_skills:
    - "*"

# Tools configuration for ReAct-enabled agents (MetaDataAgent, WriterAgent)
tools:
  enabled: true
  available_tools:
    - validate_citations
    - count_words
    - check_key_points
    - search_papers
  max_react_iterations: 3
  paper_search:
    # semantic_scholar_api_key: null  # Optional: set for higher rate limits
    timeout: 15

agents:
  - name: paper_parser
    model:
      model_name: kimi-k2-turbo-preview
      api_key: YOUR_API_KEY
      base_url: https://api.moonshot.cn/v1

  - name: template_parser
    model:
      model_name: kimi-k2-turbo-preview
      api_key: YOUR_API_KEY
      base_url: https://api.moonshot.cn/v1

  - name: commander
    model:
      model_name: kimi-k2-turbo-preview
      api_key: YOUR_API_KEY
      base_url: https://api.moonshot.cn/v1

  - name: writer
    model:
      model_name: kimi-k2-turbo-preview
      api_key: YOUR_API_KEY
      base_url: https://api.moonshot.cn/v1
    writer_config:
      max_review_iterations: 2
      enable_review: true
      enable_tools: true
      available_tools:
        - validate_citations
        - count_words
        - check_key_points

  - name: typesetter
    model:
      model_name: kimi-k2-turbo-preview
      api_key: YOUR_API_KEY
      base_url: https://api.moonshot.cn/v1

  - name: metadata
    model:
      model_name: kimi-k2-turbo-preview
      api_key: YOUR_API_KEY
      base_url: https://api.moonshot.cn/v1
    metadata_config:
      enable_mini_review: true
      max_review_iterations: 2

  - name: reviewer
    model:
      model_name: kimi-k2-turbo-preview
      api_key: YOUR_API_KEY
      base_url: https://api.moonshot.cn/v1

  - name: planner
    model:
      model_name: kimi-k2-turbo-preview
      api_key: YOUR_API_KEY
      base_url: https://api.moonshot.cn/v1

  - name: vlm_review
    # VLM provider is configured via vlm_service below; only agent behavior here
    vlm_review_config:
      enabled: true
      render_dpi: 150
      max_pages_to_analyze: 12
      check_overflow: true
      check_underfill: true
      check_layout: false
      min_fill_percentage: 0.85
      max_blank_area: 0.15

# Shared VLM service (PlannerAgent + VLMReviewAgent share the same provider)
vlm_service:
  enabled: true
  provider: openai
  model: openai/gpt-4o
  api_key: YOUR_OPENROUTER_KEY
  base_url: https://openrouter.ai/api/v1
