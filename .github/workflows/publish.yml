name: Publish to PyPI

on:
  push:
    tags: ["v*"]

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      on_master: ${{ steps.check.outputs.on_master }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: check
        run: |
          if git branch -r --contains "${{ github.sha }}" | grep -q 'origin/master'; then
            echo "on_master=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${{ github.ref_name }} is not on master — skipping publish."
            echo "on_master=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: guard
    if: needs.guard.outputs.on_master == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: uv run python -m pytest --tb=short -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
