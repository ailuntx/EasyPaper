name: CI

on:
  push:
    branches: [master, commercial]
  pull_request:
    branches: [master, commercial]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: uv run python -m pytest --tb=short -q
